name: finflow
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  fl_chart: ^1.1.1
  path: ^1.9.0
  shared_preferences: ^2.5.3
  flutter_local_notifications: ^19.5.0
  permission_handler: ^11.3.1
  flutter_sms_inbox: ^1.0.4
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_slidable: ^4.0.3
  provider: ^6.1.5+1
  logging: ^1.2.0
  flutter_speed_dial: ^7.0.0
  csv: ^6.0.0
  file_picker: ^10.3.7
  share_plus: ^12.0.1
  timezone: ^0.10.1
  flutter_secure_storage: ^9.2.4
  local_auth: ^3.0.0
  image_picker: ^1.2.1
  flutter_svg: ^2.2.3
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  math_expressions: ^2.6.0
  url_launcher: ^6.3.0
  uuid: ^4.5.1
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.3
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^6.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.11

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.jpg"

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icon/
    - assets/google_icon.svg
